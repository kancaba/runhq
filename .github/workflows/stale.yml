name: Stale

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Manage stale issues & PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-stale: 30
          days-before-close: 7
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          exempt-issue-labels: 'pinned,security,good first issue,help wanted'
          exempt-pr-labels: 'pinned,security'
          stale-issue-message: >
            This issue has been inactive for 30 days and has been marked as stale.
            It will be closed in 7 days if no further activity occurs.
            Remove the `stale` label or comment to keep it open.
          stale-pr-message: >
            This PR has been inactive for 30 days and has been marked as stale.
            It will be closed in 7 days if no further activity occurs.
            Remove the `stale` label or comment to keep it open.
          close-issue-message: >
            Closing due to inactivity. Feel free to reopen if this is still relevant.
          close-pr-message: >
            Closing due to inactivity. Feel free to reopen when ready to continue.
