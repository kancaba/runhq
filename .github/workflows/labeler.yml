name: PR Auto-Label

on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  issues: write
  pull-requests: write

jobs:
  label:
    name: Label by changed paths
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
