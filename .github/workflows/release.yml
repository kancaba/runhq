name: Release

on:
  push:
    tags: ['v*']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    name: Release (${{ matrix.platform }}${{ matrix.args && format(' {0}', matrix.args) || '' }})

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev \
            libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            crates/runhq-core -> target
            apps/desktop/src-tauri -> target

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS builds rely on the ad-hoc `signingIdentity: "-"` from
          # tauri.conf.json — see docs/RELEASING.md for the full strategy.
          # DO NOT set APPLE_* env vars here unconditionally: tauri-action
          # treats any non-empty value as "a real Developer ID cert is
          # present" and crashes `security import` if the secret is blank.
          # To enable notarization later, gate the APPLE_* block behind an
          # `if: env.APPLE_CERTIFICATE != ''` runner step, or split it into
          # a conditional job — never pipe empty secrets straight to env.
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'RunHQ ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download and install RunHQ.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

