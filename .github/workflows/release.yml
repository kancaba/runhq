name: Release

on:
  push:
    tags: ['v*']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    name: Release (${{ matrix.platform }}${{ matrix.args && format(' {0}', matrix.args) || '' }})

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev \
            libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            crates/runhq-core -> target
            apps/desktop/src-tauri -> target

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'RunHQ ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download and install RunHQ.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  update-homebrew-tap:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          repository: erdembas/homebrew-runhq
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Update Cask
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          URL="https://github.com/erdembas/runhq/releases/download/${{ github.ref_name }}/RunHQ_${VERSION}_aarch64.dmg"
          SHA=$(curl -sL "$URL" | shasum -a 256 | cut -d' ' -f1)

          cat > Casks/runhq.rb <<CASK
          cask "runhq" do
            version "${VERSION}"
            sha256 "${SHA}"

            url "${URL}"
            name "RunHQ"
            desc "The universal local service orchestrator."
            homepage "https://github.com/erdembas/runhq"

            depends_on macos: ">= :ventura"

            app "RunHQ.app"
          end
          CASK

      - name: Commit and push
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/runhq.rb
          git commit -m "Update RunHQ to ${VERSION}"
          git push
