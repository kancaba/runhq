<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="RunHQ">
  <defs>
    <linearGradient id="rhq-ember" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FB923C"/>
      <stop offset="1" stop-color="#FDBA74"/>
    </linearGradient>
    <radialGradient id="rhq-gloss" cx="140" cy="110" r="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rhq-shade" cx="256" cy="520" r="280" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7C2D12" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#7C2D12" stop-opacity="0"/>
    </radialGradient>
    <filter id="rhq-bolt-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="5" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="110" ry="110" fill="url(#rhq-ember)"/>
  <rect width="512" height="512" rx="110" ry="110" fill="url(#rhq-gloss)"/>
  <rect width="512" height="512" rx="110" ry="110" fill="url(#rhq-shade)"/>
  <rect x="1" y="1" width="510" height="510" rx="109" ry="109"
        fill="none" stroke="#FFFFFF" stroke-opacity="0.18"/>

  <!-- lucide `zap` path, scaled from 24-unit grid to 316px centred at (256,256) -->
  <g transform="translate(92,92) scale(13.17)" filter="url(#rhq-bolt-shadow)">
    <path d="M13 2 L3 14 L12 14 L11 22 L21 10 L12 10 Z" fill="#FFF7ED"/>
  </g>
</svg>
